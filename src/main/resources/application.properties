spring.application.name=car_dealership

spring.profiles.active=prod

logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
server.port=8080
spring.datasource.url=jdbc:postgresql://localhost:5432/dealership
spring.servlet.multipart.max-file-size=5MB

openai.api.key=
openai.api.url=https://api.openai.com/v1/chat/completions
openai.api.model=gpt-4o-mini

aws.access-key-id=test
aws.secret-key=test
aws.s3.region=us-east-1
aws.s3.endpoint-url=http://localhost:4566
aws.s3.path-style-access=true
aws.s3.bucket-name=car-dealership-s3-dev
